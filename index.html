<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Better Internet For Kids</title>
    
    <!-- iOS & Mobile Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Better Internet For Kids</div>
      </div>
    </div>

    <!-- Rotate Notice for Mobile Portrait -->
    <div id="rotateNotice" style="display:none;">
      <p>Please rotate your device to landscape</p>
    </div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Unity banner display function
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/RELEASE.loader.js";
      var config = {
        dataUrl: buildUrl + "/RELEASE.data",
        frameworkUrl: buildUrl + "/RELEASE.framework.js",
        codeUrl: buildUrl + "/RELEASE.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "IDEI Skopje",
        productName: "Better Internet For Kids",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Mobile device detection
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if (isMobile) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      // Native Fullscreen API fallback with browser prefixes
      function fallbackToNativeFullscreen(element) {
        var requestFullscreen = 
          element.requestFullscreen || 
          element.webkitRequestFullscreen || 
          element.mozRequestFullScreen || 
          element.msRequestFullscreen;
          
        if (requestFullscreen) {
          requestFullscreen.call(element).catch(function(err) {
            console.log('Native fullscreen failed:', err);
            
            // Last resort: try on documentElement
            var docRequest = 
              document.documentElement.requestFullscreen || 
              document.documentElement.webkitRequestFullscreen ||
              document.documentElement.mozRequestFullScreen ||
              document.documentElement.msRequestFullscreen;
            if (docRequest) {
              docRequest.call(document.documentElement).catch(function() {});
            }
          });
        }
      }

      // Unified fullscreen handler
      function doFullscreen(targetElement, unityInstance) {
        // Check if already fullscreen
        var isFullscreen = 
          document.fullscreenElement || 
          document.webkitFullscreenElement || 
          document.mozFullScreenElement || 
          document.msFullscreenElement;
          
        if (isFullscreen) {
          // Exit fullscreen
          var exitFullscreen = 
            document.exitFullscreen || 
            document.webkitExitFullscreen || 
            document.mozCancelFullScreen || 
            document.msExitFullscreen;
          if (exitFullscreen) exitFullscreen.call(document);
          if (unityInstance && unityInstance.SetFullscreen) {
            unityInstance.SetFullscreen(0);
          }
        } else {
          // Enter fullscreen
          // 1. Try Unity's API first (best for WebGL)
          if (unityInstance && typeof unityInstance.SetFullscreen === 'function') {
            try {
              unityInstance.SetFullscreen(1);
              return; // Assume success
            } catch (e) {
              console.log('Unity SetFullscreen failed, trying native:', e);
            }
          }
          
          // 2. Fallback to native Fullscreen API
          fallbackToNativeFullscreen(targetElement);
          
          // 3. Force viewport reflow on iOS
          if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            setTimeout(function() {
              window.dispatchEvent(new Event('resize'));
            }, 100);
          }
        }
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          
          // Store unityInstance globally
          window.unityInstance = unityInstance;
          
          // Desktop: use 'click'
          fullscreenButton.addEventListener('click', function(e) {
            // Only prevent default on mobile
            if (isMobile) {
              e.preventDefault();
            }
            doFullscreen(canvas, unityInstance);
          });

          // Mobile: also listen to 'touchstart' for iOS reliability
          if (isMobile) {
            fullscreenButton.addEventListener('touchstart', function(e) {
              e.preventDefault(); // Required for iOS fullscreen
              doFullscreen(canvas, unityInstance);
            }, { passive: false });
          }
          
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

      // Rotate notice handling for mobile
      if (isMobile) {
        var rotateNotice = document.getElementById('rotateNotice');
        
        function handleOrientation() {
          if (window.innerHeight > window.innerWidth) {
            // Portrait mode
            rotateNotice.style.display = 'flex';
            canvas.style.display = 'none';
          } else {
            // Landscape mode
            rotateNotice.style.display = 'none';
            canvas.style.display = 'block';
          }
        }

        window.addEventListener('resize', handleOrientation);
        handleOrientation();
      }
    </script>

    <style>
      /* Rotate Notice Styles */
      #rotateNotice {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-size: 1.5em;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
    </style>
  </body>
</html>
